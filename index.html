      { name: "The Slow Burn Arc", steps: [["Intro", "Silence & Space", "Barely there instrumentation, intimate hushed vocal."], ["Verse 1", "Whispered truths", "Short lines, lots of empty space between phrases."], ["Verse 2", "Layering", "Drums enter softly, vocals gain a bit of confidence."], ["Bridge", "The simmer", "Repeating a mantra as instruments slowly swell in volume."], ["The Climax", "Wall of Sound", "Screamed or belted vocals, explosive drums, overwhelming emotion."], ["Outro", "Sudden cut", "Instantly drops back to total silence or a single held note."]] },
      { name: "Neo-Soul Groove", steps: [["Intro", "Vibe Check", "Complex chord progression, spoken word intro."], ["Verse 1", "Conversational", "Laid back delivery, floating slightly behind the beat."], ["Chorus", "Harmonic bliss", "Thick vocal stacks, smooth and jazzy."], ["Verse 2", "Playful", "More ad-libs, interactive interplay between vocal and bassline."], ["Vamp / Outro", "The Jam", "Repeating the chorus progression while the vocalist improvises runs and scat-sings to fade."]] },
      { name: "The Two-Part Suite (Beat Switch)", steps: [["Part 1: Verse", "Aggressive", "Fast tempo, attacking the beat, confrontational lyrics."], ["Part 1: Hook", "Hype", "Short, sharp, repetitive."], ["The Switch", "Transition", "Record scratch, beat suddenly slows down and gets moody/ambient."], ["Part 2: Verse", "Introspective", "Slower flow, vulnerable lyrics, looking inward."], ["Part 2: Outro", "Spoken Word", "A philosophical or reflective spoken outro over fading chords."]] }
    ];

    // 🔥 5. ALL OTHER ARRAYS (Verified fully intact)
    const POVS = ["The Direct Confession (First Person: I/You)", "The Storyteller (Third Person: He/She/They)", "The Unreliable Narrator (Lying to the listener/themselves)", "The Inner Monologue (Talking strictly to yourself)", "The Ghost (Singing from beyond the relationship or life)", "The Accuser (Second Person: Dictating exactly what they did)", "The Fly on the Wall (Detached, clinical, emotionless observation)"];
    const CADENCES = ["Fast, triplet-heavy rhythmic flow", "Conversational, dragging slightly behind the beat", "Long, sweeping, theatrical legato notes", "Staccato, punchy, and aggressive", "Slightly slurred, drunken, or exhausted delivery", "Crisp, fast-paced enunciation", "Breathless and rushed, like running out of time", "Soulful, heavy melismatic runs", "Deadpan, spoken-word style", "Soft, breathy, ASMR-like close proximity"];
    const TWISTS = ["The beat completely drops out for the first half of verse 2", "The perspective flips entirely to the villain in the bridge", "Sudden tempo shift to half-time", "Modulate up a minor third for the final massive chorus", "A stark acoustic breakdown right after the climax", "The final hook is whispered instead of belted", "A massive, unexpected genre switch for the bridge", "The lyrics suddenly break the fourth wall and speak to the audience", "Introduce a completely new melody and chord progression in the outro", "The chorus lyrics completely change meaning the final time they are sung", "All instruments drop out leaving a 4-part acappella harmony", "A screeching, dissonant synth/guitar solo interrupts a soft moment"];
    const EMOTIONS = ["Nostalgia", "Hope", "Resentment", "Longing", "Confidence", "Guilt", "Yearning", "Relief", "Regret", "Defiance", "Tenderness", "Jealousy", "Awe", "Grief", "Calm", "Restlessness"];
    const RHYME = ["Simple end rhymes, conversational diction", "Slant rhymes, modern phrasing, internal echoes", "Sparse rhymes, vivid imagery, punchy lines", "Dense internal rhymes, rhythmic wordplay", "No-rhyme free verse but with strong cadence", "Call-and-response phrasing, hook-forward repetition"];
    const VOCAL_ARCHETYPES = [{ name:"The Confessor", verse:"close-mic, intimate, restrained", chorus:"open tone, warm lift", bridge:"nearly spoken, vulnerable" }, { name:"The Rebel", verse:"gritty, forward, rhythmic phrasing", chorus:"bigger edge, punch consonants", bridge:"half-sung grit, tension" }, { name:"The Dreamer", verse:"airy, soft, floating vowels", chorus:"soaring, layered harmonies", bridge:"breathy clarity, emotional crack" }, { name:"The Villain", verse:"low and controlled, theatrical", chorus:"dramatic lift, sharp dynamics", bridge:"cold whisper → sudden snap" }, { name:"The Storyteller", verse:"clear articulation, narrative drive", chorus:"anthemic, singalong", bridge:"pause-heavy, honest delivery" }];
    
    const INST = ["Fuzzy analog synths, tight 808s, and a heavily distorted vocal sample", "Nylon string acoustic, brush drums, and a sweeping cello", "Washed-out shoegaze guitars, driving bass, and buried vocals", "Crisp piano, soaring strings, and a massive sub-bass", "Lo-fi drum break, jazzy Rhodes piano, and vinyl crackle", "Down-tuned 8-string guitars, blast beats, and a guttural synth line", "Upright bass, muted trumpet, and soft finger-snaps", "Massive supersaw synths, four-on-the-floor kick, and sidechained pads", "Clean Stratocaster, groovy bassline, and tight funk drums", "Mellotron flutes, 12-string acoustic, and tambourine", "Gritty distorted bass, trap hi-hats, and eerie music-box bells", "Reverb-drenched slide guitar, slow heavy kick, and distant vocal hums", "8-bit chiptune leads, glitchy percussion, and a vocoder", "Fuzzy bass, garage rock drums, and gang vocals", "Lush orchestral harp, glockenspiel, and deep timpani rolls"];
    const FORBIDDEN = ["Love, Heart, Baby, Cry, Tonight", "Girl, Boy, World, Fire, Desire", "Yeah, Oh, Stop, Go, Time", "Tears, Years, Fears, Eyes, Lies", "Walk, Talk, Sleep, Weep, Deep", "Sun, Moon, Stars, Sky, Fly", "Forever, Never, Always, Please, Down", "Crazy, Hazy, Night, Light, Right", "Sad, Mad, Glad, Bad, Good", "Alone, Home, Phone, Stone, Bone"];
    const TITLE_ADJ = ["Neon", "Hollow", "Midnight", "Static", "Velvet", "Fading", "Golden", "Broken", "Silent", "Bitter", "Savage", "Crimson", "Electric", "Restless", "Suburban", "Plastic", "Ghostly", "Tangled", "Heavy"];
    const TITLE_NOUNS = ["Regret", "Echoes", "Bones", "Shadows", "Wires", "Hearts", "Ghosts", "Whispers", "Sunsets", "Tears", "Strangers", "Skies", "Mirrors", "Nights", "Lies", "Promises", "Cigarettes", "Memories"];

    function xmur3(str) { let h = 1779033703 ^ str.length; for (let i = 0; i < str.length; i++) { h = Math.imul(h ^ str.charCodeAt(i), 3432918353); h = (h << 13) | (h >>> 19); } return function() { h = Math.imul(h ^ (h >>> 16), 2246822507); h = Math.imul(h ^ (h >>> 13), 3266489909); return (h ^= h >>> 16) >>> 0; }; }
    function mulberry32(a) { return function() { let t = a += 0x6D2B79F5; t = Math.imul(t ^ (t >>> 15), t | 1); t ^= t + Math.imul(t ^ (t >>> 7), t | 61); return ((t ^ (t >>> 14)) >>> 0) / 4294967296; }; }
    function makeRng(seedStr){ const seed = seedStr && seedStr.trim() ? seedStr.trim() : String(Date.now()); const a = xmur3(seed)(); return { seed, rand: mulberry32(a) }; }
    function pick(rng, arr){ return arr[Math.floor(rng.rand() * arr.length)]; }

    function generateMusic(rng, chaos) {
      const isWild = (rng.rand() * 100) < chaos;
      const bpm = isWild ? Math.floor(rng.rand() * (175 - 60 + 1) + 60) : Math.floor(rng.rand() * (128 - 90 + 1) + 90);
      const keys = ["C", "C#", "D", "Eb", "E", "F", "F#", "G", "G#", "A", "Bb", "B"];
      const scales = isWild ? ["Major", "Minor", "Dorian", "Mixolydian", "Harmonic Minor", "Phrygian", "Lydian"] : ["Major", "Minor"];
      return `${bpm} BPM | Key: ${pick(rng, keys)} ${pick(rng, scales)}`;
    }

    const LockButton = ({ isLocked, onToggle }) => (
      <button className={`lock-btn ${isLocked ? 'active' : ''}`} onClick={onToggle} title={isLocked ? "Unlock" : "Lock"}>
        {isLocked ? '🔒' : '🔓'}
      </button>
    );

    const EditableKeyValue = ({ label, value, lockKey, locks, toggleLock, onEditSave, customClass="" }) => {
      const [isEditing, setIsEditing] = useState(false);
      const [tempVal, setTempVal] = useState(value);

      useEffect(() => { setTempVal(value); }, [value]);

      const handleBlur = () => {
        setIsEditing(false);
        if (tempVal !== value) {
          onEditSave(lockKey, tempVal);
        }
      };

      const rows = (tempVal || "").split('\n').length || 1;

      return (
        <div className={`kv ${locks[lockKey] ? 'locked' : ''} ${customClass}`}>
          <div className="k">
            {label}
            <LockButton isLocked={locks[lockKey]} onToggle={() => toggleLock(lockKey)} />
          </div>
          {isEditing ? (
            <textarea 
              autoFocus className="v" value={tempVal} 
              onChange={(e) => setTempVal(e.target.value)} onBlur={handleBlur}
              rows={rows}
            />
          ) : (
            <div className="v editable" onClick={() => setIsEditing(true)} title="Click to edit! ✏️">{value}</div>
          )}
        </div>
      );
    };

    const EditableStep = ({ step, index, onStepEditSave }) => {
      const [name, hint, desc] = step;
      const [isEditing, setIsEditing] = useState(false);
      const [tempDesc, setTempDesc] = useState(desc);

      useEffect(() => { setTempDesc(desc); }, [desc]);

      const handleBlur = () => {
        setIsEditing(false);
        if (tempDesc !== desc) {
          onStepEditSave(index, tempDesc);
        }
      };

      const rows = (tempDesc || "").split('\n').length || 1;

      return (
        <div className="step">
          <div className="step-hd">
            <span className="step-name">{name}</span>
            <span className="step-hint">{hint}</span>
          </div>
          {isEditing ? (
            <textarea 
              autoFocus className="step-desc" value={tempDesc} 
              onChange={(e) => setTempDesc(e.target.value)} onBlur={handleBlur}
              rows={rows}
            />
          ) : (
            <div className="step-desc editable" onClick={() => setIsEditing(true)} title="Click to edit! ✏️">{desc}</div>
          )}
        </div>
      );
    };

    const App = () => {
      const [seedInput, setSeedInput] = useState("");
      const [chaos, setChaos] = useState(20);
      const [currentBp, setCurrentBp] = useState(null);
      const [saves, setSaves] = useState([]);
      const [toastMsg, setToastMsg] = useState({ text: "", visible: false });

      const [locks, setLocks] = useState({
        title: false, genres: false, music: false, inst: false, topic: false, pov: false, emotion: false, 
        imagery: false, rhyme: false, vocal: false, cadence: false, 
        twist: false, constraint: false, structure: false
      });

      const toggleLock = (key) => setLocks(prev => ({ ...prev, [key]: !prev[key] }));

      const showToast = (msg) => {
        setToastMsg({ text: msg, visible: true });
        setTimeout(() => setToastMsg(prev => ({ ...prev, visible: false })), 2000);
      };

      const handleOverrideSave = (key, customText) => {
        setCurrentBp(prev => ({
          ...prev,
          overrides: { ...(prev.overrides || {}), [key]: customText }
        }));
        setLocks(prev => ({ ...prev, [key]: true })); 
        showToast("Custom edit locked! 🔒✨");
      };

      const handleStructureStepEdit = (stepIndex, newDesc) => {
        const newSteps = [...currentBp.structure.steps];
        newSteps[stepIndex] = [newSteps[stepIndex][0], newSteps[stepIndex][1], newDesc];
        
        setCurrentBp(prev => ({
          ...prev,
          structure: { ...prev.structure, steps: newSteps }
        }));
        setLocks(prev => ({ ...prev, structure: true })); 
        showToast("Structure edit locked! 🔒✨");
      };

      useEffect(() => {
        try {
          const loaded = JSON.parse(localStorage.getItem("lyricalchemy_saves_v11") || "[]");
          setSaves(loaded);
        } catch (e) { console.error("Could not load saves", e); }
        setTimeout(() => handleGenerate(true), 10);
      }, []); 

      const handleGenerate = (isInitial = false) => {
        const { seed, rand } = makeRng(seedInput);
        const rng = { seed, rand };

        const shouldLock = (key) => !isInitial && currentBp && locks[key];

        const activeOverrides = {};
        if (!isInitial && currentBp && currentBp.overrides) {
          Object.keys(currentBp.overrides).forEach(k => {
            if (locks[k]) activeOverrides[k] = currentBp.overrides[k];
          });
        }

        const isCohesive = (rng.rand() * 100) > chaos; 

        const safeGenres = GENRES.slice(0, 30); 
        let primaryGenre = isCohesive ? pick(rng, safeGenres) : pick(rng, GENRES);
        let secondaryGenre = isCohesive ? pick(rng, safeGenres) : pick(rng, GENRES);
        if (primaryGenre === secondaryGenre) secondaryGenre = pick(rng, GENRES);

        const curatedEmotionPairs = [["Confidence","Insecurity"],["Nostalgia","Resentment"],["Hope","Fear"],["Relief","Grief"],["Tenderness","Jealousy"],["Calm","Restlessness"],["Defiance","Guilt"],["Longing","Regret"]];
        let chosenEmotion = { surface: pick(rng, EMOTIONS), core: pick(rng, EMOTIONS) };
        if (isCohesive) {
            const pair = pick(rng, curatedEmotionPairs);
            chosenEmotion = { surface: pair[0], core: pair[1] };
        }

        const newBp = {
          seed: seed, 
          chaos: chaos, 
          mode: chaos <= 25 ? "Studio" : chaos <= 60 ? "Hybrid" : "Experimental", 
          createdAt: new Date().toISOString(),
          
          title: shouldLock('title') ? currentBp.title : `Project: ${pick(rng, TITLE_ADJ)} ${pick(rng, TITLE_NOUNS)}`,
          genres: shouldLock('genres') ? currentBp.genres : { primary: primaryGenre, secondary: secondaryGenre },
          music: shouldLock('music') ? currentBp.music : generateMusic(rng, chaos),
          inst: shouldLock('inst') ? currentBp.inst : pick(rng, INST),
          
          topic: shouldLock('topic') ? currentBp.topic : pick(rng, TOPICS),
          pov: shouldLock('pov') ? currentBp.pov : pick(rng, POVS),
          emotion: shouldLock('emotion') ? currentBp.emotion : chosenEmotion,
          imagery: shouldLock('imagery') ? currentBp.imagery : pick(rng, IMAGERY),
          
          rhyme: shouldLock('rhyme') ? currentBp.rhyme : pick(rng, RHYME),
          vocal: shouldLock('vocal') ? currentBp.vocal : pick(rng, VOCAL_ARCHETYPES),
          cadence: shouldLock('cadence') ? currentBp.cadence : pick(rng, CADENCES),
          
          structure: shouldLock('structure') ? currentBp.structure : pick(rng, STRUCTURES),
          twist: shouldLock('twist') ? currentBp.twist : pick(rng, TWISTS),
          constraint: shouldLock('constraint') ? currentBp.constraint : pick(rng, FORBIDDEN),
          
          overrides: activeOverrides
        };

        setCurrentBp(newBp);
      };

      const handleSave = () => {
        if (!currentBp) return showToast("Generate first! 🎲");
        const newSaves = [currentBp, ...saves];
        setSaves(newSaves);
        localStorage.setItem("lyricalchemy_saves_v11", JSON.stringify(newSaves));
        showToast("Saved to Studio ✨");
      };

      const handleLoad = (bp) => {
        setCurrentBp(bp); setSeedInput(bp.seed); setChaos(bp.chaos);
        showToast("Loaded blueprint 📥");
      };

      const handleExport = () => {
        if (!currentBp) return showToast("Generate first! 🎲");
        const blob = new Blob([JSON.stringify(currentBp, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `LyricAlchemy_${currentBp.seed}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast("Exported JSON 📤");
      };

      const getVal = (key, defaultVal) => {
        if (currentBp && currentBp.overrides && currentBp.overrides[key] !== undefined) {
          return currentBp.overrides[key];
        }
        return defaultVal;
      };

      return (
        <div className="wrap">
          <header>
            <div className="brand">
              <h1>LyricAlchemy ✨</h1>
              <p>The Final Boss. All arrays verified, unlocked, and firing at max capacity.</p>
            </div>
            <div className="pillrow">
              <div className="pill">Seed: <b>{currentBp ? currentBp.seed : "—"}</b></div>
              <div className="pill">Mode: <b>{currentBp ? currentBp.mode : "—"}</b></div>
            </div>
          </header>

          <div className="grid">
            <section className="glass-panel">
              <div className="card-hd">
                <h2>Studio Generator</h2>
                <div className="row">
                  <button className="primary" onClick={() => handleGenerate(false)}>🎲 Generate</button>
                  <button className="small" onClick={handleSave}>💾 Save</button>
                  <button className="small" onClick={handleExport}>📤 Export JSON</button>
                </div>
              </div>
              
              <div className="card-bd" style={{ borderBottom: '1px solid var(--line)', paddingBottom: '30px' }}>
                <div className="row" style={{ alignItems: 'flex-start' }}>
                  <label>
                    <span>Seed (Repeatable Base)</span>
                    <input type="text" value={seedInput} onChange={(e) => setSeedInput(e.target.value)} placeholder="Leave blank for random magic..." />
                  </label>
                  <label>
                    <span>Chaos Factor: <b>{chaos}</b></span>
                    <input type="range" min="0" max="100" value={chaos} onChange={(e) => setChaos(Number(e.target.value))} />
                  </label>
                </div>
              </div>

              {currentBp && (
                <div className="card-bd" style={{ paddingTop: 0 }}>
                  
                  <div className="blueprint-section" style={{ borderColor: 'var(--accent-purple)', background: 'rgba(179,140,255,0.05)' }}>
                    <h3 style={{ color: 'var(--text)' }}>🏷️ The Blueprint Identity</h3>
                    <div className="kv-grid">
                      <EditableKeyValue label="Working Title" value={getVal('title', currentBp.title)} lockKey="title" locks={locks} toggleLock={toggleLock} onEditSave={handleOverrideSave} />
                    </div>
                  </div>

                  <div className="blueprint-section">
                    <h3>🌌 The Vibe</h3>
                    <div className="kv-grid">
                      <EditableKeyValue label="Genres" value={getVal('genres', `${currentBp.genres.primary} + ${currentBp.genres.secondary} (Flavor)`)} lockKey="genres" locks={locks} toggleLock={toggleLock} onEditSave={handleOverrideSave} />
                      <EditableKeyValue label="BPM, Key & Scale" value={getVal('music', currentBp.music)} lockKey="music" locks={locks} toggleLock={toggleLock} onEditSave={handleOverrideSave} />
                      <EditableKeyValue label="Instrumentation Palette" value={getVal('inst', currentBp.inst)} lockKey="inst" locks={locks} toggleLock={toggleLock} onEditSave={handleOverrideSave} />
                    </div>
                  </div>

                  <div className="blueprint-section">
                    <h3>🫀 The Core</h3>
                    <div className="kv-grid">
                      <EditableKeyValue label="Topic" value={getVal('topic', currentBp.topic)} lockKey="topic" locks={locks} toggleLock={toggleLock} onEditSave={handleOverrideSave} />
                      <EditableKeyValue label="Narrative POV" value={getVal('pov', currentBp.pov)} lockKey="pov" locks={locks} toggleLock={toggleLock} onEditSave={handleOverrideSave} />
                      <EditableKeyValue label="Emotion (Surface / Core)" value={getVal('emotion', `${currentBp.emotion.surface} / ${currentBp.emotion.core}`)} lockKey="emotion" locks={locks} toggleLock={toggleLock} onEditSave={handleOverrideSave} />
                      <EditableKeyValue label="Imagery Theme" value={getVal('imagery', currentBp.imagery)} lockKey="imagery" locks={locks} toggleLock={toggleLock} onEditSave={handleOverrideSave} />
                    </div>
                  </div>

                  <div className="blueprint-section">
                    <h3>🗣️ The Voice</h3>
                    <div className="kv-grid">
                      <EditableKeyValue label="Rhyme & Diction" value={getVal('rhyme', currentBp.rhyme)} lockKey="rhyme" locks={locks} toggleLock={toggleLock} onEditSave={handleOverrideSave} />
                      <EditableKeyValue label="Vocal Tone" value={getVal('vocal', `${currentBp.vocal.name}\nVerse: ${currentBp.vocal.verse}\nChorus: ${currentBp.vocal.chorus}\nBridge: ${currentBp.vocal.bridge}`)} lockKey="vocal" locks={locks} toggleLock={toggleLock} onEditSave={handleOverrideSave} />
                      <EditableKeyValue label="Flow & Cadence" value={getVal('cadence', currentBp.cadence)} lockKey="cadence" locks={locks} toggleLock={toggleLock} onEditSave={handleOverrideSave} />
                    </div>
                  </div>

                  <div className="blueprint-section">
                    <h3>🃏 The Curveball & Constraints</h3>
                    <div className="kv-grid">
                      <EditableKeyValue label="Plot Twist" value={getVal('twist', currentBp.twist)} lockKey="twist" locks={locks} toggleLock={toggleLock} onEditSave={handleOverrideSave} />
                      <EditableKeyValue label="Forbidden Words" value={getVal('constraint', currentBp.constraint)} lockKey="constraint" locks={locks} toggleLock={toggleLock} onEditSave={handleOverrideSave} />
                    </div>
                  </div>

                  <div className={`blueprint-section ${locks.structure ? 'locked' : ''}`}>
                    <h3>
                      🏗️ The Structure: {currentBp.structure.name}
                      <LockButton isLocked={locks.structure} onToggle={() => toggleLock('structure')} />
                    </h3>
                    <div className="structure-list">
                      {currentBp.structure.steps.map((step, i) => (
                        <EditableStep key={i} step={step} index={i} onStepEditSave={handleStructureStepEdit} />
                      ))}
                    </div>
                  </div>
                </div>
              )}
            </section>

            <aside className="glass-panel" style={{ alignSelf: 'start' }}>
              <div className="card-hd">
                <h2>Saved Blueprints</h2>
                {saves.length > 0 && <button className="small danger" onClick={() => { setSaves([]); localStorage.removeItem("lyricalchemy_saves_v11"); showToast("Cleared 🗑️"); }}>Clear</button>}
              </div>
              <div className="card-bd">
                {saves.length === 0 ? (
                  <p style={{ color: "var(--muted)", fontSize: "14px" }}>Nothing saved yet.</p>
                ) : (
                  <div className="saved-list">
                    {saves.map((bp, i) => {
                      const title = (bp.overrides && bp.overrides.title) ? bp.overrides.title : bp.title;
                      return (
                        <div key={i} className="fav">
                          <div className="fav-title" style={{ color: 'var(--accent-gold)' }}>{title}</div>
                          <div className="fav-meta">
                            <span>{bp.genres.primary} / {bp.genres.secondary}</span><br/>
                            <span>Seed: {bp.seed}</span>
                          </div>
                          <div className="fav-actions">
                            <button className="small" onClick={() => handleLoad(bp)}>📥 Load</button>
                          </div>
                        </div>
                      )
                    })}
                  </div>
                )}
              </div>
            </aside>
          </div>
          <div className={`toast ${toastMsg.visible ? 'show' : ''}`}>{toastMsg.text}</div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
